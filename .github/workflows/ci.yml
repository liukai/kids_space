name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify JavaScript syntax
        run: node --check script.js

      - name: Verify required files exist
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js
