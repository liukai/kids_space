name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify JavaScript syntax
        run: node --check times_table/script.js

      - name: Verify required files exist
        run: |
          test -f times_table/index.html
          test -f times_table/styles.css
          test -f times_table/script.js
