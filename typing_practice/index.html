<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <title>TYPING.EXE — retro terminal</title>
  <!-- Fonts: optional online; IBM Plex Mono / VT323 have system fallbacks in CSS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
<!-- Pure local: js/words-data.js embeds the word list (no fetch). Edit data/words.json then: python3 tools/sync_words_to_js.py -->
  <div class="page-wrap app-shell">
  <header class="app-topbar">
    <h1 class="app-title">TYPING.EXE</h1>
  </header>

  <div class="app-work">
  <aside class="config-panel" id="configPanel" aria-label="Settings">
    <div id="controls">
      <h2 class="config-heading">Rows</h2>
      <div class="row-toggles">
        <label><input type="checkbox" id="chkTop" checked /> Top <span class="dim">Q–P</span></label>
        <label><input type="checkbox" id="chkHome" checked /> Home <span class="dim">A–L</span></label>
        <label><input type="checkbox" id="chkBot" checked /> Bot <span class="dim">Z–M</span></label>
      </div>
      <div id="rowWarn" aria-live="polite"></div>
      <h2 class="config-heading">Mode</h2>
      <div class="mode-col" role="radiogroup" aria-label="Typing mode">
        <label><input type="radio" name="mode" id="modeLetter" value="letter" /> Letter</label>
        <label><input type="radio" name="mode" id="modeWord" value="word" checked /> Word</label>
        <label><input type="radio" name="mode" id="modeSentence" value="sentence" /> Sentence</label>
        <label><input type="radio" name="mode" id="modeQuiz" value="quiz" /> Quiz</label>
      </div>
      <label class="read-toggle read-toggle-panel"><input type="checkbox" id="chkReadIntro" checked /> <span id="readIntroText">🔊 Hear first</span></label>
      <h2 class="config-heading">Sound</h2>
      <div class="sound-toggles" role="group" aria-label="Sound and speech">
        <label class="sound-line sound-line-master"><input type="checkbox" id="chkTtsMaster" checked /> All</label>
        <label class="sound-line"><input type="checkbox" id="chkTtsEn" checked /> English</label>
        <label class="sound-line"><input type="checkbox" id="chkTtsZh" /> 中文</label>
        <label class="sound-line"><input type="checkbox" id="chkKeySounds" checked /> Keys</label>
      </div>
      <div class="voice-panel">
        <div class="voice-line">
          <label for="selEnVoice">Voice · EN</label>
          <select id="selEnVoice" aria-label="English voice"></select>
        </div>
        <div class="voice-line">
          <label for="selZhVoice">Voice · 中文</label>
          <select id="selZhVoice" aria-label="Chinese voice"></select>
        </div>
      </div>
      <div class="stats-tools">
        <button type="button" id="btnClearStats" class="btn-clear-stats">Clear scores</button>
        <button type="button" id="btnDownloadPage" class="btn-download-page panel-btn">Save page</button>
      </div>
    </div>
  </aside>

  <div class="typing-stage">
  <div id="flash" tabindex="0" role="application" aria-label="Typing">
    <div class="typing-main-panel">
    <div class="typing-panel-card typing-panel-card--word-info" aria-live="polite">
      <div id="gentleNudge" class="gentle-nudge" role="status" aria-live="polite"></div>
      <div id="quizHud" class="quiz-hud" style="display: none;">
        🏃 <strong id="quizWpmLive">—</strong> wpm · words <strong id="quizWordProg">0</strong>/<strong id="quizWordTotal">0</strong>
      </div>
      <div id="quizDoneBanner" class="quiz-done-banner" role="status" aria-live="polite"></div>
      <div id="wordBadgeRow" aria-hidden="true"></div>
      <div id="wordDifficultyFun" class="difficulty-fun-wrap" role="status" aria-live="polite"></div>
      <div id="wordLevelLine" class="word-level-line" role="note" aria-live="polite"></div>
    </div>
    <div class="typing-panel-card typing-panel-card--screen">
    <div class="crt-surface-wrap">
    <div class="word-stage" id="wordStage">
      <div
        id="trophy2xBadge"
        class="trophy-2x-badge"
        hidden
        role="status"
        aria-live="polite"
      ></div>
      <span id="wordEmoji" class="word-emoji-main" aria-hidden="true">✨</span>
      <div id="wordDisplay" aria-live="polite"></div>
    </div>
    </div>
    </div>
    <div class="typing-panel-card typing-panel-card--footer">
    <div class="word-card-actions">
      <div class="card-btns">
        <button type="button" id="btnSpeak" class="btn-hear-again">🔊 Again</button>
        <button type="button" id="btnNext" class="btn-skip">⏭️ Skip</button>
      </div>
    </div>
    <div id="zhLine" lang="zh-CN"></div>
    </div>
    </div>
  </div>
  </div>

  <aside class="stats-panel" id="statsPanel" aria-label="Trophies and scores">
    <div class="panel-stats">
      <div class="trophy-panel" id="trophyPanel">
        <div class="trophy-panel-head" aria-live="polite">
          <div class="trophy-panel-title">🏆 Trophies</div>
          <div class="trophy-hero-row">
            <span class="trophy-hero" aria-hidden="true">🏆</span>
            <span class="trophy-hero-times" aria-hidden="true">×</span>
            <span class="trophy-hero-count" id="trophyMegaCountEl">0</span>
          </div>
        </div>
        <div class="trophy-points-line">
          <span class="trophy-points-ico" aria-hidden="true">⭐</span>
          <strong id="trophyPointsEl">0</strong>
          <span class="trophy-points-label">pts</span>
        </div>
        <div class="trophy-micro" title="3 of each kind merge to the next">🥉×3→🥈 · 🥈×3→🥇 · 🥇×3→🏆</div>
        <div class="trophy-next-progress" id="trophyNextProgressBlock">
          <div class="trophy-next-label" id="trophyNextLabel">—</div>
          <div
            class="trophy-next-track"
            id="trophyNextTrack"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
            aria-label="Progress toward next trophy"
          >
            <div class="trophy-next-fill" id="trophyNextFill"></div>
          </div>
        </div>
        <div class="trophy-row-visual" id="trophyRowBronze">
          <span class="trophy-row-emoji" aria-hidden="true">🥉</span>
          <div class="trophy-dots" id="trophyBronzeDots" aria-hidden="true"></div>
        </div>
        <div class="trophy-row-visual" id="trophyRowSilver">
          <span class="trophy-row-emoji" aria-hidden="true">🥈</span>
          <div class="trophy-dots" id="trophySilverDots" aria-hidden="true"></div>
        </div>
        <div class="trophy-row-visual" id="trophyRowGold">
          <span class="trophy-row-emoji" aria-hidden="true">🥇</span>
          <div class="trophy-dots" id="trophyGoldDots" aria-hidden="true"></div>
        </div>
      </div>
      <div id="kidStats" class="kid-stats kid-stats-panel" aria-live="polite">
        <div class="kid-stats-title">Scores</div>
        <div class="stats-summary-cards">
          <div
            class="stats-summary-card"
            title="Word + Sentence: each word you finish"
          >
            <span class="stats-summary-label">Practice</span>
            <span class="stats-summary-value" id="statWordsTotal">0</span>
          </div>
          <div class="stats-summary-card stats-summary-card--quiz" title="Quiz mode words typed">
            <span class="stats-summary-label">Quiz</span>
            <span class="stats-summary-value" id="statQuizWords">0</span>
          </div>
        </div>
        <div
          class="stats-finishes-row"
          title="Finishes from chips below (sentences = 1 each)"
        >
          <span class="stats-finishes-label">Finishes</span>
          <span class="stats-finishes-value" id="statFinishes">0</span>
        </div>
        <div class="kid-stats-grid kid-stats-grid--panel">
          <div
            class="stat-chip cvc"
            title="CVC words finished"
          >
            <span class="stat-emoji">🐸</span>
            <span class="stat-label">CVC</span>
            <span class="stat-num" id="statCvc">0</span>
          </div>
          <div class="stat-chip sight" title="Sight words finished">
            <span class="stat-emoji">❤️</span>
            <span class="stat-label">Sight</span>
            <span class="stat-num" id="statSight">0</span>
          </div>
          <div class="stat-chip simple" title="Vocab words finished">
            <span class="stat-emoji">🌈</span>
            <span class="stat-label">Vocab</span>
            <span class="stat-num" id="statSimple">0</span>
          </div>
          <div class="stat-chip phrase" title="Sentences finished">
            <span class="stat-emoji">📝</span>
            <span class="stat-label">Lines</span>
            <span class="stat-num" id="statPhrase">0</span>
          </div>
        </div>
        <div class="kid-stats-letters-row" title="Letter mode only">
          <span class="kid-stats-letters-label">Letters</span>
          <span class="kid-stats-letters-num" id="statLetters">0</span>
        </div>
        <div class="kid-round" id="roundInfo">—</div>
        <div id="quizStatsFooter" class="quiz-stats-footer quiz-stats-cards" style="display: none;">
          <div class="quiz-stat-line">
            <span class="quiz-stat-k">Best wpm</span>
            <span class="quiz-stat-v" id="statQuizBest">—</span>
          </div>
          <div class="quiz-stat-line">
            <span class="quiz-stat-k">Last</span>
            <span class="quiz-stat-v" id="statQuizLast">—</span>
          </div>
          <div class="quiz-stat-line">
            <span class="quiz-stat-k">Quizzes</span>
            <span class="quiz-stat-v" id="statQuizCount">0</span>
          </div>
        </div>
      </div>
    </div>
  </aside>

  </div>

  <input id="hiddenInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-hidden="true" />

  <div id="trophyToast" class="trophy-toast" hidden role="status" aria-live="polite">
    <div class="trophy-toast-card">
      <span class="trophy-toast-emoji" id="trophyToastEmoji" aria-hidden="true">🏆</span>
      <div class="trophy-toast-text" id="trophyToastText"></div>
    </div>
  </div>

  <footer class="app-kb-footer">
    <div id="kb-wrap" aria-label="Keyboard">
      <div id="keyboard"></div>
    </div>
  </footer>

  </div>

  <script src="js/config.js"></script>
  <script src="js/words-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
